version: '3.8'

services:
  vulnerable-web:
    image: httpd:2.4
    privileged: true
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ADMIN_PASSWORD=password123
      - ROOT_PASSWORD=root
    command: ["httpd-foreground"]

  debug-shell:
    image: ubuntu:latest
    command: sleep 3600
    stdin_open: true
    tty: true
    volumes:
      - /:/host:rw
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
