version: '3.8'

services:
  vulnerable-web:
    image: httpd:2.4.59
    ports:
      - "80:80"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - seccomp:default.json
      - apparmor:default
    user: "www-data:www-data"
    read_only: true

  debug-shell:
    image: alpine:3.18
    command: sleep 3600
    user: "1000:1000"
    cap_drop:
      - ALL
    read_only: true
